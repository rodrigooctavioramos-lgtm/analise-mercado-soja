name: Daily Soybean & Energy Market Report

on:
  schedule:
    # Runs at 11:00 UTC (exactly 08:00 AM Brasilia Time UTC-3) Monday to Friday (1-5)
    - cron: '0 11 * * 1-5'
  # Allows manual triggers from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate and Send Daily Report
      env:
        # SMTP Credentials from GitHub Secrets
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        # Recipient overrides (optional fallback built into the script)
        RECIPIENT_SIMONE: ${{ secrets.RECIPIENT_SIMONE }}
        RECIPIENT_ALDENOR: ${{ secrets.RECIPIENT_ALDENOR }}
        RECIPIENT_RODRIGO: ${{ secrets.RECIPIENT_RODRIGO }}
      run: |
        python agendador_diario_soja.py --now
