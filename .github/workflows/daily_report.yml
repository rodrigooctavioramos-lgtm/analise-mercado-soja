name: Daily Soybean & Energy Market Report

on:
  schedule:
    # Runs at 11:00 UTC (exactly 08:00 AM Brasilia Time UTC-3) Monday to Friday (1-5)
    - cron: '0 11 * * 1-5'
  # Allows manual triggers from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-send:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate and Send Daily Report
      env:
        # SMTP Credentials (sender email is public, password is a GitHub Secret)
        SENDER_EMAIL: "rodrigooctavioramos@gmail.com"
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        # Recipient email configurations
        RECIPIENT_SIMONE: "simone.santos@agrofoods.ind.br"
        RECIPIENT_ALDENOR: "aldenor.filho@agrofoods.ind.br"
        RECIPIENT_RODRIGO: "rodrigooctavioramos@gmail.com"
      run: |
        python agendador_diario_soja.py --now
